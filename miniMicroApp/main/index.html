<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234ade80'/%3E%3Cpath d='M8 23V9h4l4 7 4-7h4v14h-4v-8l-4 7-4-7v8z' fill='%23111827'/%3E%3C/svg%3E" />
    <title>Mini Micro App Demo</title>
    <style>
      :root {
        font: 16px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #182033;
        background: #eef2f7;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      button, input { font: inherit; }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .sidebar {
        background: #111827;
        color: #e5e7eb;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .brand { display: flex; gap: 12px; align-items: center; }
      .brand-mark {
        width: 42px; height: 42px;
        display: inline-grid; place-items: center;
        border-radius: 8px; background: #4ade80; color: #111827;
        font-weight: 800;
      }
      .brand h1 { font-size: 20px; line-height: 1.15; margin: 0; }
      .brand p { color: #9ca3af; font-size: 13px; margin: 0; }
      .topbar p { margin: 0; }
      .topbar h2 { margin: 0; }

      .nav { display: grid; gap: 10px; }
      .nav-item {
        width: 100%; min-height: 76px;
        border: 1px solid #263244; border-radius: 8px;
        background: #172033; color: #d1d5db;
        padding: 14px; text-align: left; cursor: pointer;
        display: grid; gap: 4px;
      }
      .nav-item span { color: #f9fafb; font-weight: 700; }
      .nav-item.active { border-color: #4ade80; background: #1c2b3a; }

      .panel {
        margin-top: auto;
        border: 1px solid #263244; border-radius: 8px;
        padding: 16px; display: grid; gap: 10px; background: #172033;
      }
      .panel h2 { font-size: 16px; margin: 0; }
      .panel label { color: #cbd5e1; font-size: 13px; }
      .panel input {
        width: 100%; min-height: 42px;
        border: 1px solid #334155; border-radius: 6px;
        padding: 0 12px; color: #f8fafc; background: #0f172a;
      }
      .send {
        min-height: 42px; border: 0; border-radius: 6px;
        color: #052e16; background: #4ade80; font-weight: 700; cursor: pointer;
      }
      .child-panel { margin-top: 0; }
      .child-panel p { color: #f8fafc; font-weight: 700; margin: 0; }
      .child-panel small { color: #9ca3af; }

      .workspace {
        min-width: 0; padding: 24px;
        display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 18px;
      }

      .topbar {
        min-height: 78px; display: flex; align-items: center; gap: 16px;
        padding: 0 22px;
        border: 1px solid #d9e0ea; border-radius: 8px; background: #fff;
      }
      .topbar h2 { font-size: 24px; }
      .eyebrow { color: #9ca3af; font-size: 13px; }

      .micro-container {
        min-height: 620px;
        border: 1px solid #d9e0ea; border-radius: 8px; overflow: hidden; background: #fff;
      }
      .micro-panel { display: none; width: 100%; min-height: 620px; }
      .micro-panel.active { display: block; }

      @media (max-width: 860px) {
        .shell { grid-template-columns: 1fr; }
        .workspace { padding: 16px; }
        .topbar { flex-direction: column; padding: 18px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
