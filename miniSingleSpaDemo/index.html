<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mini single-spa core demo</title>
    <style>
      /* 全局样式：与微前端无关，仅用于 demo 页面美观 */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      header {
        padding: 20px 32px;
        background: #111827;
        color: white;
      }

      /* 顶部导航链接，点击后通过 hash 切换子应用 */
      nav {
        display: flex;
        gap: 12px;
        padding: 16px 32px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
      }

      nav a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      /* 子应用挂载容器：每个子应用对应一个独立的 DOM 节点 */
      main {
        display: grid;
        gap: 16px;
        padding: 24px 32px;
      }

      .app-card {
        padding: 20px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: white;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>mini single-spa core</h1>
      <p>精简实现：注册应用、劫持路由、按路由挂载/卸载子应用。</p>
    </header>

    <!-- 点击导航链接会改变 URL hash，进而触发 mini-single-spa 的 reroute 调度 -->
    <nav>
      <a href="#/home">Home</a>
      <a href="#/orders">Orders</a>
      <a href="#/profile">Profile</a>
    </nav>

    <main>
      <!-- 每个子应用有独立的容器元素，通过 customProps 传递给相应子应用的 mount 函数 -->
      <div id="home-root" class="app-card"></div>
      <div id="orders-root" class="app-card"></div>
      <div id="profile-root" class="app-card"></div>
    </main>

    <!-- 入口模块：注册应用并启动调度 -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
